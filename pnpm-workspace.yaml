# pnpm 10+ blocks dependency build scripts unless approved here. These five are
# the repo's only deps with postinstall scripts, all standard native modules
# that ship prebuilt binaries (no compile in practice): esbuild (vitest/tsx),
# keccak (ethereum hashing), sharp (image processing), bufferutil and
# utf-8-validate (ws performance addons). A fresh `pnpm install` (CI, a new
# clone) FAILS with ERR_PNPM_IGNORED_BUILDS if any is left unapproved.
allowBuilds:
  bufferutil: true
  dtrace-provider: true
  es5-ext: true
  esbuild: true
  keccak: true
  secp256k1: true
  sharp: true
  utf-8-validate: true
  web3: true
  web3-bzz: true
  web3-shh: true
